name: Weekly Model Retrain

on:
  schedule:
    # Sunday 10:00 UTC = 6:00 AM ET (DST). Daylight summer alignment matches daily-picks.yml.
    - cron: '0 10 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (validate only, do not write model)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  pull-requests: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database
        run: |
          if gh run download --name mlb-picker-db --dir /tmp/db-restore 2>/dev/null; then
            cp /tmp/db-restore/mlb_picker.db .
            echo "DB restored from artifact"
          elif [ -f seed/mlb_picker.db ]; then
            cp seed/mlb_picker.db .
            echo "Using seed DB"
          else
            echo "ERROR: no database available — cannot retrain"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Migrate database schema
        run: python3 migrate.py mlb_picker.db

      - name: Run retrain
        id: retrain
        continue-on-error: true
        run: |
          DRY=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY="--dry-run"
          fi
          python -m model.retrain $DRY
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Read retrain report
        id: report
        run: |
          if [ -f model/retrain_report.json ]; then
            cat model/retrain_report.json
            ACTION=$(python3 -c "import json; print(json.load(open('model/retrain_report.json'))['action'])")
            ACCURACY=$(python3 -c "import json; r=json.load(open('model/retrain_report.json')); print(f\"{r['candidate_metrics']['accuracy']:.3f}\")")
            DELTA=$(python3 -c "import json; r=json.load(open('model/retrain_report.json')); d=r.get('accuracy_delta'); print(f\"{d:+.3f}\" if d is not None else 'n/a')")
            BLOCKED=$(python3 -c "import json; print(json.load(open('model/retrain_report.json')).get('regression_blocked', False))")
            echo "action=$ACTION" >> $GITHUB_OUTPUT
            echo "accuracy=$ACCURACY" >> $GITHUB_OUTPUT
            echo "delta=$DELTA" >> $GITHUB_OUTPUT
            echo "blocked=$BLOCKED" >> $GITHUB_OUTPUT
          fi

      - name: Fail if regression-blocked
        if: steps.report.outputs.blocked == 'True'
        run: |
          echo "::error::Retrain blocked by regression gate. New candidate model was meaningfully worse than production. See report above."
          exit 1

      - name: Open PR with new model
        if: steps.report.outputs.action == 'deployed' && inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE_TAG=$(date -u +%Y-%m-%d)
          BRANCH="retrain/auto-${DATE_TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          # -f because model/retrain_report.json and model/archive/ are gitignored
          # locally (avoids noise in local git status) but we want them in the PR
          # for the audit trail and rollback safety.
          git add -f model/trained_model.pkl model/scaler.pkl model/archive/ model/retrain_report.json
          git commit -m "Weekly retrain: ${DATE_TAG}

          Candidate accuracy: ${{ steps.report.outputs.accuracy }}
          Delta vs production: ${{ steps.report.outputs.delta }}

          Auto-generated by .github/workflows/weekly-retrain.yml"
          git push origin "$BRANCH"

          gh pr create \
            --title "Weekly model retrain — ${DATE_TAG}" \
            --body "$(cat <<EOF
          Automated weekly retrain. Review the validation metrics below before merging.

          ## Validation Metrics (held-out 20% of current season)

          - **Candidate accuracy:** ${{ steps.report.outputs.accuracy }}
          - **Delta vs production:** ${{ steps.report.outputs.delta }}

          ## Action

          Status: \`${{ steps.report.outputs.action }}\`

          See \`model/retrain_report.json\` (in this PR) for full coefficients, tier breakdowns, and Brier scores.

          ## Safety

          - Prior model is archived in \`model/archive/\`
          - Regression gate (>2% drop vs production) was NOT triggered
          - To roll back: revert this PR, then trigger the daily-picks workflow manually

          🤖 Generated by .github/workflows/weekly-retrain.yml
          EOF
          )" \
            --base main \
            --head "$BRANCH"
