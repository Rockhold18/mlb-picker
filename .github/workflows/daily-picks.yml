name: MLB Daily Picks

on:
  schedule:
    # All times in UTC (ET + 4 during DST)
    - cron: '0 12 * * *'   # 8 AM ET — morning picks
    - cron: '0 15 * * *'   # 11 AM ET — lineup lock 1
    - cron: '0 18 * * *'   # 2 PM ET — lineup lock 2
    - cron: '0 21 * * *'   # 5 PM ET — lineup lock 3
    - cron: '0 0 * * *'    # 8 PM ET — lineup lock 4
    - cron: '0 5 * * *'    # 1 AM ET — results
  workflow_dispatch:        # Manual trigger from GitHub UI
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - lineup_lock
          - results
      date:
        description: 'Date override (YYYY-MM-DD, leave empty for today/yesterday)'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-picks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database and model
        run: |
          # Download artifacts from previous run if they exist
          gh run download --name mlb-picker-db --dir . 2>/dev/null || echo "No previous DB found"
          gh run download --name mlb-picker-model --dir . 2>/dev/null || echo "No previous model found"
          ls -la mlb_picker.db model/trained_model.pkl 2>/dev/null || echo "Some files missing after restore"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize (first run only)
        run: |
          if [ ! -f mlb_picker.db ] || [ ! -f model/trained_model.pkl ]; then
            echo "Database or model missing — running init..."
            python main.py init
          else
            echo "Database and model restored from artifacts, skipping init"
          fi

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            case $HOUR in
              12) echo "mode=morning" >> $GITHUB_OUTPUT ;;
              05) echo "mode=results" >> $GITHUB_OUTPUT ;;
              *)  echo "mode=lineup_lock" >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Run scheduler
        run: |
          DATE_ARG=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE_ARG="--date ${{ inputs.date }}"
          fi
          python scheduler.py ${{ steps.mode.outputs.mode }} $DATE_ARG

      - name: Regenerate dashboard for today
        run: python -c "from output.dashboard import generate_dashboard; from datetime import datetime; generate_dashboard(datetime.now().strftime('%Y-%m-%d'))"

      - name: Save database artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlb-picker-db
          path: mlb_picker.db
          retention-days: 90
          overwrite: true

      - name: Save model artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlb-picker-model
          path: |
            model/trained_model.pkl
            model/scaler.pkl
          retention-days: 90
          overwrite: true

      - name: Prepare Pages content
        run: |
          mkdir -p _site
          cp output/mlb_picks.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-dashboard:
    needs: run-picks
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
